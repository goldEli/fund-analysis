version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: agent_postgres
    command: ['postgres', '-c', 'port=5432']
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    ports:
      - '${PGPORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
